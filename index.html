<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QCE LLC</title>
  <link rel="icon" type="image/png" href="qce-llc-logo.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0;
      background: #fff;
      text-align: center;
      overflow: hidden;
      height: 80px;
      border-bottom: 1px solid #e0e0e0;
      box-shadow: 0 1px 12px rgba(0,0,0,0.08);
    }

    .header-brand img {
      height: 140px;
      width: auto;
      display: block;
      margin: -30px auto -30px;
    }

    main {
      flex: 1;
      padding: 4rem 2rem;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #555;
      margin-bottom: 2.5rem;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      border-color: #333;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: #18181f;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px solid #1e1e2e;
    }

    .card-thumb img {
      max-width: 55%;
      max-height: 65%;
      object-fit: contain;
      display: block;
      transition: transform 0.2s ease;
    }

    .card:hover .card-thumb img {
      transform: scale(1.05);
    }

    .card-body {
      padding: 1.1rem 1.25rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      flex: 1;
    }

    .card-body h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #eeeef8;
    }

    .card-url {
      font-size: 0.78rem;
      color: #555;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .card:hover .card-url {
      color: #888;
    }

    footer {
      padding: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: #333;
      letter-spacing: 0.05em;
      border-top: 1px solid #15151f;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <img src="qce-llc-logo.png" alt="QCE LLC" />
    </div>
  </header>

  <main>
    <p class="section-label">Projects</p>
    <div class="projects">

      <a class="card" href="https://portalyze.app" target="_blank" rel="noopener">
        <div class="card-thumb">
          <img src="portfolio-compass.png" alt="Portfolio Compass" />
        </div>
        <div class="card-body">
          <h3>Portfolio Compass</h3>
          <span class="card-url">portalyze.app</span>
        </div>
      </a>

      <a class="card" href="https://quickcards.shop" target="_blank" rel="noopener">
        <div class="card-thumb">
          <img src="quick-cards.png" alt="Quick Cards" />
        </div>
        <div class="card-body">
          <h3>Quick Cards</h3>
          <span class="card-url">quickcards.shop</span>
        </div>
      </a>

      <a class="card" href="https://rrewards.vercel.app" target="_blank" rel="noopener">
        <div class="card-thumb" style="background:#111;">
          <img src="reward-logo.png" alt="Rewards" />
        </div>
        <div class="card-body">
          <h3>Rewards</h3>
          <span class="card-url">rrewards.vercel.app</span>
        </div>
      </a>

      <a class="card" href="https://school-pickup-app-henna.vercel.app/" target="_blank" rel="noopener">
        <div class="card-thumb" style="background:#f8f8ff;">
          <img src="pickmeup-logo.png" alt="PickMeUp Kids" />
        </div>
        <div class="card-body">
          <h3>PickMeUp Kids</h3>
          <span class="card-url">school-pickup-app-henna.vercel.app</span>
        </div>
      </a>

      <a class="card" href="https://sackofdump.github.io/deepsea/" target="_blank" rel="noopener">
        <div class="card-thumb" style="background:#0d2540;">
          <img src="deepsea-logo.png" alt="Deep Sea Salvage" />
        </div>
        <div class="card-body">
          <h3>Deep Sea Salvage</h3>
          <span class="card-url">sackofdump.github.io/deepsea</span>
        </div>
      </a>

    </div>
  </main>

  <footer>
    &copy; 2026 QCE LLC
  </footer>

</body>
</html>
