<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QCE LLC</title>
  <link rel="icon" type="image/png" href="qce-llc-logo.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 3rem 2rem;
      border-bottom: 1px solid #ddd;
      background: #fff;
      text-align: center;
    }

    .header-brand img {
      height: 220px;
      width: auto;
      display: block;
      margin: 0 auto;
    }

    main {
      flex: 1;
      padding: 3rem 2rem;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    main h2 {
      font-size: 1.1rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 2rem;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      border-color: #555;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.05em;
      overflow: hidden;
    }

    .card-thumb img {
      max-width: 60%;
      max-height: 60%;
      object-fit: contain;
      display: block;
    }

    .card-body {
      padding: 1rem;
    }

    .card-body h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .card-body p {
      font-size: 0.85rem;
      color: #888;
      line-height: 1.5;
    }

    footer {
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: #444;
      border-top: 1px solid #222;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-brand">
      <img src="qce-llc-logo.png" alt="QCE LLC Logo" />
    </div>
  </header>

  <main>
    <h2>Projects</h2>
    <div class="projects">

      <a class="card" href="https://portalyze.app" target="_blank" rel="noopener">
        <div class="card-thumb">
          <img src="portfolio-compass.png" alt="Portfolio Compass" />
        </div>
        <div class="card-body">
          <h3>Portfolio Compass</h3>
          <p>portalyze.app</p>
        </div>
      </a>

      <a class="card" href="https://quickcards.shop" target="_blank" rel="noopener">
        <div class="card-thumb">
          <img src="quick-cards.png" alt="Quick Cards" />
        </div>
        <div class="card-body">
          <h3>Quick Cards</h3>
          <p>quickcards.shop</p>
        </div>
      </a>

    </div>
  </main>

  <footer>
    &copy; 2026 QCE LLC
  </footer>

</body>
</html>
